<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Provenance Guard Dashboard</title>
  <style>
    body { font-family: sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .card { border: 1px solid #ccc; border-radius: 8px; padding: 1rem; }
    .value { font-size: 1.8rem; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Provenance Guard Analytics</h1>
  <p>Total submissions: {{ stats.total_submissions }}</p>
  <div class="grid">
    <div class="card">
      <div>Likely AI</div>
      <div class="value">{{ stats.likely_ai_pct }}%</div>
    </div>
    <div class="card">
      <div>Likely Human</div>
      <div class="value">{{ stats.likely_human_pct }}%</div>
    </div>
    <div class="card">
      <div>Uncertain</div>
      <div class="value">{{ stats.uncertain_pct }}%</div>
    </div>
    <div class="card">
      <div>Appeal Rate</div>
      <div class="value">{{ stats.appeal_rate_pct }}%</div>
    </div>
    <div class="card">
      <div>Avg Confidence</div>
      <div class="value">{{ stats.avg_confidence }}</div>
    </div>
  </div>
</body>
</html>
